name: S6_combined
description: Combined adversarial conditions. High load with bursts plus selective forwarding, model poisoning, and QKD degradation.
traffic_mode: bursty
enable_hotspots: true
total_slots: 18000
n_seeds_default: 10
schemes: [frl_qkd, heuristic, centralized_rl, frl_noqkd]
traffic:
  hotspot_cluster_fraction: 0.30
  hotspot_burst_interval_s: 2
  burst_on_slots: 60
  burst_off_slots: 300
attacks:
  selective_forwarding_fraction: 0.20
  selective_forwarding_drop_probability: 0.50
  false_metric_fraction: 0.20
  false_metric_bias: 0.30
  model_poisoning_fraction: 0.20
  model_poisoning_scale: 0.20
  elevated_qber: 0.10
  classical_key_compromise_fraction: 0.20
qkd:
  enabled: true
  link_length_km: 20.0
  nominal_qber: 0.10
